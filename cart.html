<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Cart — MayaPets Premium Nutrition</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    body { font-family: 'Poppins', sans-serif; background: var(--gray); color: var(--black); line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; }
    main { flex: 1; padding: 60px 0; }
    h1 { font-size: 2.2rem; font-weight: 900; margin-bottom: 40px; padding: 0 5vw; max-width: 1300px; margin-left: auto; margin-right: auto; }
    .empty-cart { text-align: center; padding: 80px 5vw; background: white; border-radius: 32px; max-width: 600px; margin: 0 auto; box-shadow: var(--shadow); }
    .empty-icon { font-size: 80px; color: #ddd; margin-bottom: 20px; }
    .shop-now-btn { display: inline-block; background: var(--blue); color: white; text-decoration: none; padding: 14px 30px; border-radius: 50px; font-weight: 700; margin-top: 20px; transition: 0.3s; }
    .shop-now-btn:hover { background: var(--blue2); transform: translateY(-3px); }
    footer { background: #111; color: white; padding: 40px 5vw; text-align: center; font-size: 0.9rem; }
  </style>
</head>
<body>

  <nav>
    <div class="nav-container">
      <a class="logo" href="index.html">
      <div class="logo-icon"><span class="material-symbols-outlined">pets</span></div>
      <span class="logo-text">Maya<span>Pets</span></span>
    </a>
    <ul class="nav-links">
      <li><a href="pet-food.html">Pet Food</a></li>
      <li><a href="pharmacy.html">Pharmacy</a></li>
      <li><a href="accessories.html">Accessories</a></li>
      <li><a href="grooming.html">Grooming</a></li>
      <li><a href="index.html#why">About Us</a></li>
    </ul>
    <div class="nav-actions">
      <button class="nav-icon-btn" id="authBtn" onclick="window.location.href='login.html'" title="Sign In"><span class="material-symbols-outlined">person</span></button>
      <a href="cart.html" class="nav-icon-btn" style="text-decoration:none">
        <span class="material-symbols-outlined" >shopping_bag</span>
        <span class="cart-badge" id="cartBadge">0</span>
      </a>
    </div>
    </div>
  </nav>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";
    const app = initializeApp({
      apiKey: "AIzaSyBTDb-RiuIKmXC4MJJQgSidWbLylNO-NHw",
      authDomain: "mayapetsproject.firebaseapp.com",
      projectId: "mayapetsproject",
      storageBucket: "mayapetsproject.firebasestorage.app",
      messagingSenderId: "988493888178",
      appId: "1:988493888178:web:a1984309337782333a27ab"
    });
    const auth = getAuth(app);
    const btn = document.getElementById('authBtn');
    if (btn) {
      onAuthStateChanged(auth, (user) => {
        if (user) {
          const name = user.displayName || user.email;
          const initial = name.charAt(0).toUpperCase();
          btn.innerHTML = `<div style="width:34px;height:34px;border-radius:50%;background:var(--blue);color:white;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:0.95rem;">${initial}</div>`;
          btn.title = `Hi ${name} — View Account`;
          btn.onclick = () => window.location.href = 'profile.html';
        } else {
          btn.innerHTML = `<span class="material-symbols-outlined">person</span>`;
          btn.title = 'Sign In';
          btn.onclick = () => window.location.href = 'login.html';
        }
      });
    }
  </script>


  <main id="cartMain">
    <!-- Rendered by JS -->
  </main>

  <footer>
    <p>&copy; 2026 MayaPets Premium Nutrition. All rights reserved.</p>
  </footer>

  <script src="cart.js"></script>
  <script>
    function renderCart() {
      const cart = getCart();
      const main = document.getElementById('cartMain');
      
      if (cart.length === 0) {
        main.innerHTML = `
          <div class="empty-cart">
            <span class="material-symbols-outlined empty-icon">shopping_cart_off</span>
            <h2>Your cart is empty</h2>
            <p>Looks like you haven't added anything yet. Your pets are waiting!</p>
            <a href="pet-food.html" class="shop-now-btn">Explore Products</a>
          </div>
        `;
        return;
      }

      let subtotal = 0;
      const itemsHtml = cart.map(item => {
        const itemTotal = item.price * item.qty;
        subtotal += itemTotal;
        return `
          <div class="cart-item-row">
            <img src="${item.image}" class="cart-item-img" alt="${item.name}">
            <div class="cart-item-info">
              <span class="cart-item-brand">${item.brand}</span>
              <h3>${item.name}</h3>
              <p style="font-size:0.85rem; color:#666">Unit: ${item.unit}</p>
              <div class="qty-stepper" style="margin-top:10px">
                <button class="qty-btn" onclick="updateItemQty('${item.id}', -1)">−</button>
                <span class="qty-val">${item.qty}</span>
                <button class="qty-btn" onclick="updateItemQty('${item.id}', 1)">+</button>
              </div>
            </div>
            <div class="cart-item-actions">
              <div class="cart-item-price">₹${itemTotal.toLocaleString()}</div>
              <button class="btn-order-single" onclick="orderItem('${item.id}')">Order This Item</button>
              <button class="btn-remove" onclick="handleRemove('${item.id}')">
                <span class="material-symbols-outlined" style="font-size:16px; vertical-align:middle">delete</span> Remove
              </button>
            </div>
          </div>
        `;
      }).join('');

      main.innerHTML = `
        <h1>Shopping Cart</h1>
        <div class="cart-page-content">
          <div class="cart-items-list">
            ${itemsHtml}
          </div>
          <div class="cart-summary-card">
            <h2 style="font-size:1.4rem; margin-bottom:25px">Order Summary</h2>
            <div class="summary-row">
              <span>Items Total</span>
              <span>₹${subtotal.toLocaleString()}</span>
            </div>
            <div class="summary-row">
              <span>Shipping</span>
              <span style="color:var(--blue); font-weight:700">FREE</span>
            </div>
            <div class="summary-row">
              <span>Tax</span>
              <span>₹0.00</span>
            </div>
            <div class="summary-row summary-total">
              <span>Grand Total</span>
              <span>₹${subtotal.toLocaleString()}</span>
            </div>
            <button class="btn-order-all" onclick="orderAll()">Order All Items</button>
            <p style="font-size:0.75rem; color:#888; text-align:center; margin-top:15px">
              By clicking "Order", you agree to MayaPets terms and conditions.
            </p>
          </div>
        </div>
      `;
    }

    function updateItemQty(id, delta) {
      let cart = getCart();
      const item = cart.find(i => String(i.id) === String(id));
      if (item) {
        item.qty = Math.max(1, item.qty + delta);
        saveCart(cart);
        renderCart();
      }
    }

    function handleRemove(id) {
      removeFromCart(id);
      renderCart();
    }

    // Listen for cart updates
    window.addEventListener('cartUpdated', renderCart);
    document.addEventListener('DOMContentLoaded', renderCart);
  </script>
</body>
</html>
